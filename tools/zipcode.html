            border: none;

            font-size: 16px;

            }

            }
            
            h1 {

        // 更新城市列表
        function updateCities() {
            var province = document.getElementById('province').value;
            var citySelect = document.getElementById('city');
            var districtSelect = document.getElementById('district');
            
            // 清空城市和区县选择
            citySelect.innerHTML = '<option value="">请选择城市</option>';
            districtSelect.innerHTML = '<option value="">请先选择城市</option>';
            
            if (province && regions[province]) {
                var cities = regions[province].cities;
                for (var key in cities) {
                    if (cities.hasOwnProperty(key)) {
                        var city = cities[key];
                        var option = document.createElement('option');
                        option.value = key;
                        option.textContent = city.name;
                        citySelect.appendChild(option);
                    }
                }
            }
        }
        
        // 更新区县列表
        function updateDistricts() {
            var province = document.getElementById('province').value;
            var city = document.getElementById('city').value;
            var districtSelect = document.getElementById('district');
            
            // 清空区县选择
            districtSelect.innerHTML = '<option value="">请选择区县</option>';
            
            if (province && city && regions[province] && regions[province].cities[city]) {
                var districts = regions[province].cities[city].districts;
                for (var key in districts) {
                    if (districts.hasOwnProperty(key)) {
                        var district = districts[key];
                        var option = document.createElement('option');
                        option.value = key;
                        option.textContent = district.name;
                        districtSelect.appendChild(option);
                    }
                }
            }
        }
        
        // 查询邮编
        function searchZipCode() {
            var province = document.getElementById('province').value;
            var city = document.getElementById('city').value;
            var district = document.getElementById('district').value;
            var result = document.getElementById('result');
            
            if (!province || !city || !district) {
                result.innerHTML = '<p>请选择完整的地区信息</p>';
                return;
            }
            
            if (regions[province] && regions[province].cities[city] && regions[province].cities[city].districts[district]) {
                var districtInfo = regions[province].cities[city].districts[district];
                var provinceName = regions[province].name;
                var cityName = regions[province].cities[city].name;
                var districtName = districtInfo.name;
                var zipcode = districtInfo.zipcode;
                
                result.innerHTML = '<p>省份：' + provinceName + '</p><p>城市：' + cityName + '</p><p>区县：' + districtName + '</p><p>邮编：' + zipcode + '</p>';
            } else {
                result.innerHTML = '<p>未找到对应邮编</p>';
            }
        }
